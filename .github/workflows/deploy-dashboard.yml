name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild analysis artifacts
        run: |
          python scripts/retention_churn_analysis.py

      - name: Verify generated files
        run: |
          ls -la outputs
          ls -la outputs/figures
          ls -la outputs/tables

      - name: Prepare static site
        run: |
          mkdir -p site
          cp outputs/retention_dashboard.html site/index.html
          cp outputs/retention_analysis_report.md site/
          cp outputs/summary_metrics.json site/
          cp -r outputs/figures site/figures
          cp -r outputs/tables site/tables
          touch site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          force_orphan: true
